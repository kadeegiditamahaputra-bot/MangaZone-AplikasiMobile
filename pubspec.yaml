name: mangazone
description: Aplikasi MangaZone - Baca Manga Digital
publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  google_sign_in: ^6.2.1
  vibration: ^3.1.3
  flutter_local_notifications: ^19.4.0


  # UI
  cupertino_icons: ^1.0.8

  # Kamera & Galeri
  image_picker: ^1.1.2

  # Peta
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2

  # HTTP Request
  http: ^1.6.0

  # Database SQLite
  sqflite: ^2.4.2+1
  sqflite_common: ^2.5.6+1
  sqflite_common_ffi: ^2.4.0+3
  sqflite_common_ffi_web: ^0.4.2
  path: ^1.9.1
  path_provider: ^2.1.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Format Data
  intl: ^0.20.2

  # State Management
  provider: ^6.1.5+1
  auto_size_text: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true

